name: Subdomains Detect Flow

on:
  schedule:
    - cron: '0 */5 * * *'  # Cada 5 horas
  workflow_dispatch:        # Ejecución manual (opcional)
    inputs:
      domain:
        description: 'Dominio a escanear'
        required: true
        default: 'ultraperu.com'
        type: string

env:
  DOMAIN: ${{ github.event.inputs.domain || 'ultraperu.com' }}
        
jobs:
    Subfinder:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Download subfinder
              run: |
                wget -O /tmp/subfinder_2.8.0_linux_amd64.zip https://github.com/projectdiscovery/subfinder/releases/download/v2.14.0/subfinder_2.14.0_linux_amd64.zip
                unzip /tmp/subfinder_2.8.0_linux_amd64.zip -d /tmp

            - name: Run subfinder
              run: |
                /tmp/subfinder -silent -d ${{ env.DOMAIN }} -all -recursive -o /tmp/subfinder.txt
                cat /tmp/subfinder.txt
            
            - name: Upload results
              uses: actions/upload-artifact@v4
              with:
                name: subfinder-results
                path:   
                  /tmp/subfinder.txt      


    Findomain:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Download findomain
              run: |
                wget -O /tmp/findomain.zip https://github.com/Findomain/Findomain/releases/download/10.0.1/findomain-linux.zip
                unzip /tmp/findomain.zip -d /tmp
            - name: Run findomain
              run: |
                    /tmp/findomain -q -t ${{ env.DOMAIN }} > /tmp/findomain.txt
                    cat /tmp/findomain.txt

            - name: Upload results
              uses: actions/upload-artifact@v4
              with:
                name: findomain-results
                path:   
                  /tmp/findomain.txt          

    Assetfinder:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Download assetfinder
              run: |
                wget -O /tmp/assetfinder.tgz https://github.com/tomnomnom/assetfinder/releases/download/v0.1.1/assetfinder-linux-amd64-0.1.1.tgz
                tar -xzf /tmp/assetfinder.tgz -C /tmp
            - name: Run assetfinder
              run: |
                /tmp/assetfinder --subs-only ${{ env.DOMAIN }} > /tmp/assetfinder.txt
                cat /tmp/assetfinder.txt

            - name: Upload results
              uses: actions/upload-artifact@v4
              with:
                name: assetfinder-results
                path:   
                  /tmp/assetfinder.txt          
    
    ProcessResult:
        runs-on: ubuntu-latest
        needs: [Subfinder, Findomain, Assetfinder]
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                path: ./results
                
            - name: List downloaded files
              run: |
                echo "📂 Archivos descargados:"
                ls -la ./results/
                echo ""
                echo "📁 Estructura:"
                find ./results -type f

            - name: Combine all results
              run: |
                # Crear carpeta para resultados combinados
                mkdir -p ./combined
                
                # Combinar todos los resultados en un solo archivo
                echo "# Resultados combinados - ${{ env.DOMAIN }}" > ./combined/all_results.txt
                echo "📅 Fecha: $(date '+%Y-%m-%d %H:%M:%S')" >> ./combined/all_results.txt
                echo "" >> ./combined/all_results.txt
                
                # Subfinder
                if [ -f ./results/subfinder-results/subfinder.txt ]; then
                  echo "## Subfinder ($(wc -l < ./results/subfinder-results/subfinder.txt) subdominios)" >> ./combined/all_results.txt
                  cat ./results/subfinder-results/subfinder.txt >> ./combined/all_results.txt
                  echo "" >> ./combined/all_results.txt
                else
                  echo "⚠️ Subfinder: No se encontraron resultados" >> ./combined/all_results.txt
                fi
                
                # Findomain
                if [ -f ./results/findomain-results/findomain.txt ]; then
                  echo "## Findomain ($(wc -l < ./results/findomain-results/findomain.txt) subdominios)" >> ./combined/all_results.txt
                  cat ./results/findomain-results/findomain.txt >> ./combined/all_results.txt
                  echo "" >> ./combined/all_results.txt
                else
                  echo "⚠️ Findomain: No se encontraron resultados" >> ./combined/all_results.txt
                fi
                
                # Assetfinder
                if [ -f ./results/assetfinder-results/assetfinder.txt ]; then
                  echo "## Assetfinder ($(wc -l < ./results/assetfinder-results/assetfinder.txt) subdominios)" >> ./combined/all_results.txt
                  cat ./results/assetfinder-results/assetfinder.txt >> ./combined/all_results.txt
                  echo "" >> ./combined/all_results.txt
                else
                  echo "⚠️ Assetfinder: No se encontraron resultados" >> ./combined/all_results.txt
                fi
                
                echo "✅ Resultados combinados guardados en ./combined/all_results.txt"

            - name: Generate summary report
              run: |
                # Crear resumen para GitHub Step Summary
                echo "# 📊 Reporte de subdominios - ${{ env.DOMAIN }}" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "📅 **Fecha:** $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                
                echo "## 📈 Resumen por herramienta" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "| Herramienta | Subdominios | Estado |" >> $GITHUB_STEP_SUMMARY
                echo "|------------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
                
                if [ -f ./results/subfinder-results/subfinder.txt ]; then
                  COUNT=$(wc -l < ./results/subfinder-results/subfinder.txt)
                  echo "| Subfinder | $COUNT | ✅ Completado |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| Subfinder | - | ❌ Falló |" >> $GITHUB_STEP_SUMMARY
                fi
                
                if [ -f ./results/findomain-results/findomain.txt ]; then
                  COUNT=$(wc -l < ./results/findomain-results/findomain.txt)
                  echo "| Findomain | $COUNT | ✅ Completado |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| Findomain | - | ❌ Falló |" >> $GITHUB_STEP_SUMMARY
                fi
                
                if [ -f ./results/assetfinder-results/assetfinder.txt ]; then
                  COUNT=$(wc -l < ./results/assetfinder-results/assetfinder.txt)
                  echo "| Assetfinder | $COUNT | ✅ Completado |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| Assetfinder | - | ❌ Falló |" >> $GITHUB_STEP_SUMMARY
                fi
                
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "📁 **Resultados completos:**" >> $GITHUB_STEP_SUMMARY
                echo "Descarga los artefactos desde este workflow." >> $GITHUB_STEP_SUMMARY

            - name: Upload combined results
              uses: actions/upload-artifact@v4
              with:
                name: combined-results-${{ env.DOMAIN }}
                path: ./combined/all_results.txt
