# This is a basic workflow to help you get started with Actions

name: Subdomain Scanner - Passive - Assetfinder

on:
    push:
        branches: [ "main" ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    env:
        BINARY_ASSETFINDER: "https://github.com/tomnomnom/assetfinder/releases/download/v0.1.1/assetfinder-linux-amd64-0.1.1.tgz"
        DOMAIN_VALUE: "yape.com.pe"
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run assetfinder
        run: |
          wget -O /tmp/assetfinder.tgz ${{ env.BINARY_ASSETFINDER }}
          tar -xzf /tmp/assetfinder.tgz -C /tmp
          /tmp/assetfinder --subs-only -d ${{ env.DOMAIN_VALUE }} > /tmp/assetfinder.txt

      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: assetfinder-results
          path: /tmp/assetfinder.txt